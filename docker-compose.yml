services:
  xiaozhi-esp32-server:
    image: xiaozhi-esp32-server:0223-1
    container_name: xiaozhi-esp32-server
    restart: always
    security_opt:
      - seccomp:unconfined
    ports:
      # ws服务端
      - "9005:8000"
      # 管理后台
      - "9007:8002"
    volumes:
      # 配置文件目录
      - ./data:/app/data
      # 模型文件挂接，很重要
      - ../models:/app/models
      - ./tmp:/app/tmp